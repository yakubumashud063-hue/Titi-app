name: Deploy Titi-only site to GitHub Pages

on:
  push:
    branches: [titi-only]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout titi-only branch
        uses: actions/checkout@v4
        with:
          ref: titi-only

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Titi artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
